{% extends 'accounts/base_auth.html' %}

{% block content %}
<div class="text-center p-3">
    <div class="mb-4">
        {% block two_factor_content %}{% endblock %}
    </div>

    <div class="mt-4 pt-3 border-top">
        <div class="d-grid gap-2">
            <a href="{% url 'dashboard' %}" class="btn btn-primary fw-bold py-2 shadow-sm rounded-pill">
                <i class="bi bi-house-door-fill me-2"></i>Panele Dön (Dashboard)
            </a>
            
            <a href="{% url 'profile' %}" class="btn btn-link text-muted small mt-1">
                <i class="bi bi-arrow-left me-1"></i>Güvenlik Ayarlarına Git
            </a>
        </div>
    </div>
</div>

<style>
    /* Stockiva Mavi Tonu */
    .btn-primary {
        background-color: #0d6efd !important;
        border: none !important;
        transition: all 0.3s ease;
    }
    .btn-primary:hover {
        background-color: #0056b3 !important;
        transform: translateY(-2px);
    }
</style>
{% endblock %}
