<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Stockiva{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .auth-card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .brand { font-size: 1.8rem; font-weight: 800; color: #3b82f6; text-decoration: none; display: block; text-align: center; margin-bottom: 25px; }
        .form-control { border-radius: 10px; padding: 12px; background-color: #f8fafc; border: 1px solid #e2e8f0; }
        .btn-auth { border-radius: 10px; padding: 12px; fw-bold; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="auth-card">
        <a href="/" class="brand"><i class="bi bi-layers-fill me-2"></i>Stockiva</a>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
