{% extends 'accounts/base_auth.html' %}

{% block content %}
<div class="text-center">
    <i class="bi bi-envelope-check text-primary" style="font-size: 3rem;"></i>
    <h4 class="fw-bold mt-3">Doğrulama E-postası Gönderildi</h4>
    <p class="text-muted small">
        Hesabınızı aktifleştirmek için lütfen e-posta adresinize gönderilen bağlantıya tıklayın. 
        Gereksiz (Spam) klasörünü kontrol etmeyi unutmayın.
    </p>
    <hr>
    <p class="small text-muted">E-posta gelmedi mi?</p>
    <a href="{% url 'resend_activation' %}" class="btn btn-outline-primary btn-sm fw-bold px-4 rounded-pill">
        Tekrar Gönder
    </a>
</div>
{% endblock %}
