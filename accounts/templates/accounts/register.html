{% extends 'accounts/base_auth.html' %}
{% block title %}Kayıt - Stockiva{% endblock %}
{% block content %}
    <h4 class="text-center fw-bold mb-4">Yeni Hesap Oluştur</h4>
    <form method="post" novalidate>
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                <label class="small fw-bold text-muted">{{ field.label }}</label>
                <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" class="form-control">
                {% if field.errors %}<div class="text-danger small">{{ field.errors|striptags }}</div>{% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-success w-100 btn-auth shadow mt-2">Ücretsiz Kayıt Ol</button>
    </form>
    <div class="text-center mt-4 small">
        <a href="{% url 'login' %}" class="text-decoration-none text-muted">Zaten hesabım var, giriş yap</a>
    </div>
{% endblock %}
