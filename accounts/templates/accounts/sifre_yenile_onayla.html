{% extends 'accounts/base_auth.html' %}
{% block content %}
    <h4 class="text-center fw-bold mb-4">Yeni Şifre Oluştur</h4>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-2">
                <label class="small fw-bold text-muted">{{ field.label }}</label>
                <input type="password" name="{{ field.name }}" class="form-control">
                {% if field.errors %}<div class="text-danger small mb-2">{{ field.errors|striptags }}</div>{% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-success w-100 btn-auth shadow mt-3">Şifreyi Güncelle</button>
    </form>
{% endblock %}
