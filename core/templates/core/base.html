<!DOCTYPE html>
<html lang="tr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Stockiva{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --sidebar-bg: #111827; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bs-body-bg); transition: 0.3s; }
        .sidebar { background: var(--sidebar-bg); min-height: 100vh; color: #fff; position: fixed; width: 240px; z-index: 1000; }
        .main-content { margin-left: 240px; padding: 2rem; min-height: 100vh; }
        .nav-link { color: #9ca3af; border-radius: 8px; transition: 0.3s; margin-bottom: 5px; }
        .nav-link:hover, .nav-link.active { background: #1f2937; color: #fff; }
        .kpi-card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: 0.3s; }
        
        /* Karanlık Mod Ayarları */
        [data-bs-theme="dark"] {
            --bs-body-bg: #0f172a;
            --bs-card-bg: #1e293b;
            --sidebar-bg: #020617;
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>

    <div class="d-flex">
        <aside class="sidebar p-3 d-none d-md-block">
            <a href="{% url 'home' %}" class="fs-3 fw-bold text-primary text-decoration-none px-3 mb-4 d-block">
                <i class="bi bi-layers-fill me-2"></i>Stockiva
            </a>
            <ul class="nav flex-column mt-4">
                <li><a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}"><i class="bi bi-grid-1x2-fill me-2"></i>Dashboard</a></li>
                <li><a class="nav-link {% if request.resolver_match.url_name == 'products' %}active{% endif %}" href="{% url 'products' %}"><i class="bi bi-box-seam me-2"></i>Ürünler</a></li>
                <li><a class="nav-link {% if request.resolver_match.url_name == 'upload_csv' %}active{% endif %}" href="{% url 'upload_csv' %}"><i class="bi bi-cloud-upload me-2"></i>CSV Yükle</a></li>
                <li><a class="nav-link {% if request.resolver_match.url_name == 'settings' %}active{% endif %}" href="{% url 'settings' %}"><i class="bi bi-gear-fill me-2"></i>Ayarlar</a></li>
            </ul>
            
            <div class="mt-auto pt-5 px-3 border-top border-secondary">
                <button class="btn btn-outline-light w-100 btn-sm rounded-pill mb-3" onclick="toggleTheme()">
                    <i class="bi bi-moon-stars-fill me-2" id="theme-icon"></i>Mod Değiştir
                </button>
                <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-link text-danger text-decoration-none p-0 w-100 text-start">
                        <i class="bi bi-box-arrow-right me-2"></i>Çıkış Yap
                    </button>
                </form>
            </div>
        </aside>

        <div class="main-content w-100">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function setTheme(theme) {
            document.documentElement.setAttribute('data-bs-theme', theme);
            localStorage.setItem('theme', theme);
            const icon = document.getElementById('theme-icon');
            theme === 'dark' ? icon.className = 'bi bi-sun-fill me-2' : icon.className = 'bi bi-moon-stars-fill me-2';
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
            setTheme(current);
        }
        setTheme(localStorage.getItem('theme') || 'light');
    </script>
</body>
</html>
